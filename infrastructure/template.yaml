AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: CBDFS - Cloud-Based Departmental File System

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        USERS_TABLE: !Ref UsersTable
        DOCUMENTS_TABLE: !Ref DocumentsTable
        DEPARTMENTS_TABLE: !Ref DepartmentsTable
        AUDIT_LOG_TABLE: !Ref AuditLogTable
        ACCESS_POLICY_TABLE: !Ref AccessPolicyTable
        SHARED_DOCUMENTS_TABLE: !Ref SharedDocumentsTable
        DOCUMENTS_BUCKET: !Ref DocumentsBucket
        USER_POOL_ID: !Ref UserPool
        SES_SENDER_EMAIL: michaeljames5595@gmail.com
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: "1"
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization'"
      AllowOrigin: "'*'"
    Auth:
      DefaultAuthorizer: CognitoAuthorizer
      Authorizers:
        CognitoAuthorizer:
          UserPoolArn: !GetAtt UserPool.Arn

Resources:

  # ── Cognito User Pool ──────────────────────────────────────────
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: cbdfs-user-pool
      AutoVerifiedAttributes: [email]
      UsernameAttributes: [email]
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: department
          AttributeDataType: String
          Required: false
          Mutable: true
          StringAttributeConstraints:
            MinLength: "0"
            MaxLength: "100"
      LambdaConfig:
        PostConfirmation: !GetAtt PostConfirmationFunction.Arn

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: cbdfs-web-client
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH

  # ── S3 Buckets ─────────────────────────────────────────────────
  DocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub dept-file-system-documents-028417007472
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT, POST, DELETE, HEAD]
            AllowedOrigins: ['*']
            MaxAge: 3000

  # ── DynamoDB Tables ────────────────────────────────────────────
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: cbdfs-users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: department
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: department-index
          KeySchema:
            - AttributeName: department
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  DocumentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: cbdfs-documents
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: documentId
          AttributeType: S
        - AttributeName: department
          AttributeType: S
        - AttributeName: uploadedAt
          AttributeType: S
      KeySchema:
        - AttributeName: documentId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: department-date-index
          KeySchema:
            - AttributeName: department
              KeyType: HASH
            - AttributeName: uploadedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  DepartmentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: cbdfs-departments
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: departmentId
          AttributeType: S
      KeySchema:
        - AttributeName: departmentId
          KeyType: HASH

  AuditLogTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: cbdfs-audit-log
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: logId
          AttributeType: S
        - AttributeName: department
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: logId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: department-time-index
          KeySchema:
            - AttributeName: department
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  AccessPolicyTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: cbdfs-access-policy
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: policyId
          AttributeType: S
      KeySchema:
        - AttributeName: policyId
          KeyType: HASH

  SharedDocumentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: cbdfs-shared-documents
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: shareId
          AttributeType: S
      KeySchema:
        - AttributeName: shareId
          KeyType: HASH

  # ── Lambda Functions ───────────────────────────────────────────
  PostConfirmationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cbdfs-post-confirmation
      CodeUri: ../backend/
      Handler: functions/auth/postConfirmation.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - Statement:
            Effect: Allow
            Action: cognito-idp:AdminAddUserToGroup
            Resource: !GetAtt UserPool.Arn

  PostConfirmationInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt PostConfirmationFunction.Arn
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt UserPool.Arn

  GetUploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cbdfs-get-upload-url
      CodeUri: ../backend/
      Handler: functions/files/getUploadUrl.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DocumentsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditLogTable
        - S3WritePolicy:
            BucketName: !Ref DocumentsBucket
      Events:
        Api:
          Type: Api
          Properties:
            Path: /files/upload-url
            Method: POST

  ListFilesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cbdfs-list-files
      CodeUri: ../backend/
      Handler: functions/files/listFiles.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref DocumentsTable
        - DynamoDBReadPolicy:
            TableName: !Ref SharedDocumentsTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /files
            Method: GET

  GetDownloadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cbdfs-get-download-url
      CodeUri: ../backend/
      Handler: functions/files/getDownloadUrl.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DocumentsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditLogTable
        - DynamoDBReadPolicy:
            TableName: !Ref SharedDocumentsTable
        - S3ReadPolicy:
            BucketName: !Ref DocumentsBucket
      Events:
        Api:
          Type: Api
          Properties:
            Path: /files/{fileId}/download
            Method: GET

  DeleteFileFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cbdfs-delete-file
      CodeUri: ../backend/
      Handler: functions/files/deleteFile.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DocumentsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditLogTable
        - S3CrudPolicy:
            BucketName: !Ref DocumentsBucket
      Events:
        Api:
          Type: Api
          Properties:
            Path: /files/{fileId}
            Method: DELETE

  ShareFileFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cbdfs-share-file
      CodeUri: ../backend/
      Handler: functions/files/shareFile.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DocumentsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditLogTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SharedDocumentsTable
        - Statement:
            Effect: Allow
            Action: ses:SendEmail
            Resource: '*'
      Events:
        Api:
          Type: Api
          Properties:
            Path: /files/{fileId}/share
            Method: POST

  DepartmentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cbdfs-departments
      CodeUri: ../backend/
      Handler: functions/departments/index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DepartmentsTable
      Events:
        GetDepts:
          Type: Api
          Properties:
            Path: /departments
            Method: GET
        PostDepts:
          Type: Api
          Properties:
            Path: /departments
            Method: POST
        PutDept:
          Type: Api
          Properties:
            Path: /departments/{departmentId}
            Method: PUT
        DeleteDept:
          Type: Api
          Properties:
            Path: /departments/{departmentId}
            Method: DELETE

  UsersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cbdfs-users
      CodeUri: ../backend/
      Handler: functions/users/index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - Statement:
            Effect: Allow
            Action:
              - cognito-idp:AdminAddUserToGroup
              - cognito-idp:AdminRemoveUserFromGroup
              - cognito-idp:AdminListGroupsForUser
              - cognito-idp:AdminDisableUser
              - cognito-idp:AdminCreateUser
            Resource: !GetAtt UserPool.Arn
      Events:
        GetUsers:
          Type: Api
          Properties:
            Path: /users
            Method: GET
        PutUserRole:
          Type: Api
          Properties:
            Path: /users/{userId}/role
            Method: PUT
        DeleteUser:
          Type: Api
          Properties:
            Path: /users/{userId}
            Method: DELETE

  AuditFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cbdfs-audit
      CodeUri: ../backend/
      Handler: functions/audit/index.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AuditLogTable
      Events:
        GetAudit:
          Type: Api
          Properties:
            Path: /audit
            Method: GET

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
  UserPoolClientId:
    Description: Cognito App Client ID
    Value: !Ref UserPoolClient
  DocumentsBucketName:
    Description: S3 bucket for documents
    Value: !Ref DocumentsBucket
