AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: CBDFS - Cloud-Based Departmental File System (Lambda + API Gateway)

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        USERS_TABLE: cbdfs-users
        DOCUMENTS_TABLE: cbdfs-documents
        DEPARTMENTS_TABLE: cbdfs-departments
        AUDIT_LOG_TABLE: cbdfs-audit-log
        ACCESS_POLICY_TABLE: cbdfs-access-policy
        SHARED_DOCUMENTS_TABLE: cbdfs-shared-documents
        DOCUMENTS_BUCKET: dept-file-system-documents-028417007472
        USER_POOL_ID: us-east-1_O9B0oWl3v
        SES_SENDER_EMAIL: michaeljames5595@gmail.com
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: "1"
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization'"
      AllowOrigin: "'*'"
    Auth:
      DefaultAuthorizer: CognitoAuthorizer
      AddDefaultAuthorizerToCorsPreflight: false
      Authorizers:
        CognitoAuthorizer:
          UserPoolArn: arn:aws:cognito-idp:us-east-1:028417007472:userpool/us-east-1_O9B0oWl3v

Resources:

  # ── Lambda IAM Role (shared) ────────────────────────────────────
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: cbdfs-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: cbdfs-lambda-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - arn:aws:dynamodb:us-east-1:028417007472:table/cbdfs-*
                  - arn:aws:dynamodb:us-east-1:028417007472:table/cbdfs-*/index/*
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: arn:aws:s3:::dept-file-system-documents-028417007472/*
              - Effect: Allow
                Action:
                  - cognito-idp:AdminAddUserToGroup
                  - cognito-idp:AdminRemoveUserFromGroup
                  - cognito-idp:AdminListGroupsForUser
                  - cognito-idp:AdminDisableUser
                  - cognito-idp:AdminCreateUser
                Resource: arn:aws:cognito-idp:us-east-1:028417007472:userpool/us-east-1_O9B0oWl3v
              - Effect: Allow
                Action: ses:SendEmail
                Resource: '*'

  # ── Lambda Functions ───────────────────────────────────────────
  PostConfirmationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cbdfs-post-confirmation
      CodeUri: ../backend/
      Handler: functions/auth/postConfirmation.handler
      Role: !GetAtt LambdaRole.Arn

  GetUploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cbdfs-get-upload-url
      CodeUri: ../backend/
      Handler: functions/files/getUploadUrl.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: Api
          Properties:
            Path: /files/upload-url
            Method: POST

  ListFilesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cbdfs-list-files
      CodeUri: ../backend/
      Handler: functions/files/listFiles.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: Api
          Properties:
            Path: /files
            Method: GET

  GetDownloadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cbdfs-get-download-url
      CodeUri: ../backend/
      Handler: functions/files/getDownloadUrl.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: Api
          Properties:
            Path: /files/{fileId}/download
            Method: GET

  DeleteFileFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cbdfs-delete-file
      CodeUri: ../backend/
      Handler: functions/files/deleteFile.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: Api
          Properties:
            Path: /files/{fileId}
            Method: DELETE

  ShareFileFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cbdfs-share-file
      CodeUri: ../backend/
      Handler: functions/files/shareFile.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: Api
          Properties:
            Path: /files/{fileId}/share
            Method: POST

  DepartmentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cbdfs-departments
      CodeUri: ../backend/
      Handler: functions/departments/index.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        GetDepts:
          Type: Api
          Properties:
            Path: /departments
            Method: GET
        PostDepts:
          Type: Api
          Properties:
            Path: /departments
            Method: POST
        PutDept:
          Type: Api
          Properties:
            Path: /departments/{departmentId}
            Method: PUT
        DeleteDept:
          Type: Api
          Properties:
            Path: /departments/{departmentId}
            Method: DELETE

  UsersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cbdfs-users
      CodeUri: ../backend/
      Handler: functions/users/index.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        GetUsers:
          Type: Api
          Properties:
            Path: /users
            Method: GET
        PostUser:
          Type: Api
          Properties:
            Path: /users
            Method: POST
        PutUserRole:
          Type: Api
          Properties:
            Path: /users/{userId}/role
            Method: PUT
        DeleteUser:
          Type: Api
          Properties:
            Path: /users/{userId}
            Method: DELETE

  AuditFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cbdfs-audit
      CodeUri: ../backend/
      Handler: functions/audit/index.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        GetAudit:
          Type: Api
          Properties:
            Path: /audit
            Method: GET

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod
